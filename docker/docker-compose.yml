services:
  mysql:
    image: mysql:8.0
    container_name: task_manager_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_manager
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: mysqladmin ping -h localhost -uroot -proot
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: task_manager_api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_VERSION: v1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: task_manager
      PORT: 3000
      JWT_SECRET: super-secret-key-change-in-production
      JWT_EXPIRES_IN: 24h
      DEFAULT_ADMIN_EMAIL: admin@taskmanager.com
      DEFAULT_ADMIN_PASSWORD: Admin123!
      DEFAULT_ADMIN_NOMBRE: Administrador
    ports:
      - "3000:3000"

volumes:
  mysql_data:
